<div class="site-shell" (click)="startMusicOnFirstInteraction()">
  <header class="site-header">
    <div class="title-block">
      <p class="hero-eyebrow">Nos casamos</p>
      <h1>{{ coupleNames }}</h1>
      <p class="hero-meta">{{ weddingDateLabel }}</p>
      <p class="hero-meta">{{ weddingPlaceLabel }}</p>
    </div>
  </header>

  <main class="page-view">
    <app-inicio></app-inicio>
  </main>

  <audio #bgMusic *ngIf="!musicBlocked" src="/assets/music/Alex Warren - Ordinary (Wedding Version) [Official Music Video].mp3" loop></audio>

  <div class="music-controls" *ngIf="!musicBlocked">
    <button class="music-toggle" type="button" (click)="toggleMusic()" [attr.aria-label]="isPlaying ? 'Pausar música' : 'Reproducir música'">
      {{ isPlaying ? '🎵' : '🔇' }}
    </button>
    <button class="music-block" type="button" (click)="blockMusic()" aria-label="Desactivar música">
      🚫
    </button>
  </div>
</div>
